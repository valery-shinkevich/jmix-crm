com.company.crm.ai.view.conversation/promptSuggestion.2.prompt=Mostrami le cinque fatture scadute piu importanti con cliente, importo, data di scadenza e stato. Dai priorita in base al rischio aziendale e spiega quali casi dovrei esaminare per primi.
com.company.crm.ai.view.conversation/promptSuggestion.3.title=Dai priorita alla pipeline
com.company.crm.ai.view.conversation/promptSuggestion.3.prompt=Analizza la pipeline di vendita attuale e dimmi quali trattative richiedono piu attenzione in questo momento. Considera volume, stato e possibili segnali di rischio e trasforma il risultato in una breve sintesi manageriale.
com.company.crm.ai.view.conversation/promptSuggestion.4.title=Panoramica Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.4.prompt=Crea una vista cliente compatta a 360 gradi per Connelly LLC in preparazione a un incontro con il cliente. Riassumi ricavi, fatture aperte, comportamento di pagamento, attivita recenti e rischi visibili in un briefing manageriale chiaro.
com.company.crm.ai.view.conversation/promptSuggestion.5.title=Esamina ordini Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.5.prompt=Mostrami gli ordini piu preziosi o insoliti relativi al cliente Connelly LLC e spiega perche sono rilevanti dal punto di vista aziendale. Usa i dati disponibili e indica problemi aperti, rischi o azioni di follow-up.
com.company.crm.ai.view.conversation/promptSuggestion.6.title=Catena fattura Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.6.prompt=Spiegami con un esempio concreto per il cliente Connelly LLC come fattura, ordine, pagamento e cliente sono collegati nel flusso aziendale. Se sono rilevanti piu record, trasformali in una storia aziendale chiara con gli ID o i nomi principali.
com.company.crm.ai.view.conversation/promptSuggestion.7.title=Analizza pattern di pagamento
com.company.crm.ai.view.conversation/promptSuggestion.7.prompt=Verifica se al momento ci sono pattern insoliti di pagamento, sollecito o ritardo. Mostra esempi concreti e indica dove finance o account management dovrebbero intervenire.
com.company.crm.ai.view.conversation/promptSuggestion.8.title=Presenta un prodotto
com.company.crm.ai.view.conversation/promptSuggestion.8.prompt=Crea una breve e convincente sintesi commerciale per un prodotto selezionato in linguaggio business. Descrivi il valore, i possibili casi d'uso e cio che un venditore dovrebbe enfatizzare in una conversazione.
com.company.crm.ai.view.conversation/promptSuggestion.9.title=Prossime azioni Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.9.prompt=Deriva dai dati CRM attuali le prossime azioni piu utili per vendite e finance per il cliente Connelly LLC. Dammi una lista prioritizzata con una breve motivazione cosi posso agire subito.
com.company.crm.ai.view.conversation/promptSuggestion.10.title=Report rischio cashflow
com.company.crm.ai.view.conversation/promptSuggestion.10.prompt=Analizza la distribuzione di cashflow e rischio tra le categorie di prodotti o servizi disponibili e spiega le osservazioni piu importanti. Evidenzia le categorie ad alto rischio o con allocazione insolita e dimmi quali azioni dovrebbero seguire.
