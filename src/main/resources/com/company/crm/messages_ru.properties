com.company.crm.ai.view.conversation/promptSuggestionStartAction=Запустить с этим промптом
com.company.crm.ai.view.conversation/promptSuggestion.1.title=Топ риск-клиенты
com.company.crm.ai.view.conversation/promptSuggestion.1.prompt=Проверь Connelly LLC, Kulas-Luettgen, King-Adams, Zulauf, Kihn and Lakin и Strosin Inc на признаки риска по открытым счетам, просроченным платежам или необычной недавней активности. Используй доступные CRM-данные, при необходимости выполни JPQL-запросы и коротко объясни, какие пять клиентов сейчас самые критичные и почему.
com.company.crm.ai.view.conversation/promptSuggestion.2.title=Топ просроченных счетов
com.company.crm.ai.view.conversation/promptSuggestion.2.prompt=Покажи пять самых важных просроченных счетов с клиентом, суммой, сроком оплаты и статусом. Приоритизируй их по бизнес-риску и объясни, какие случаи мне стоит проверить в первую очередь.
com.company.crm.ai.view.conversation/promptSuggestion.3.title=Приоритизировать pipeline
com.company.crm.ai.view.conversation/promptSuggestion.3.prompt=Проанализируй текущий sales pipeline и скажи, какие сделки сейчас требуют больше всего внимания. Учти объем, статус и возможные сигналы риска и оформи результат как короткое summary для менеджмента.
com.company.crm.ai.view.conversation/promptSuggestion.4.title=Обзор Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.4.prompt=Подготовь для клиента Connelly LLC компактный 360-градусный обзор для встречи с клиентом. Кратко выдели выручку, открытые счета, платежное поведение, недавние активности и заметные риски в понятном management-summary.
com.company.crm.ai.view.conversation/promptSuggestion.5.title=Проверить заказы Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.5.prompt=Покажи самые ценные или самые необычные заказы, связанные с клиентом Connelly LLC, и объясни, почему они важны с бизнес-точки зрения. Используй доступные данные и укажи открытые вопросы, риски или необходимые follow-up действия.
com.company.crm.ai.view.conversation/promptSuggestion.6.title=Цепочка счета Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.6.prompt=Объясни на одном конкретном примере для клиента Connelly LLC, как счет, заказ, платеж и клиент связаны в бизнес-процессе. Если задействовано несколько записей, собери их в одну понятную бизнес-историю с ключевыми ID или именами.
com.company.crm.ai.view.conversation/promptSuggestion.7.title=Анализ платежных паттернов
com.company.crm.ai.view.conversation/promptSuggestion.7.prompt=Проверь, есть ли сейчас необычные паттерны по платежам, напоминаниям или задержкам. Покажи конкретные примеры и сделай вывод, где finance или account management должны вмешаться.
com.company.crm.ai.view.conversation/promptSuggestion.8.title=Питч продукта
com.company.crm.ai.view.conversation/promptSuggestion.8.prompt=Сделай короткое и убедительное sales-summary по одному выбранному продукту на бизнес-языке. Опиши ценность, типовые сценарии использования и на чем продавцу стоит сделать акцент в разговоре.
com.company.crm.ai.view.conversation/promptSuggestion.9.title=Следующие действия Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.9.prompt=Выведи из текущих CRM-данных самые полезные следующие действия для sales и finance для клиента Connelly LLC. Дай мне приоритизированный список с коротким объяснением, чтобы я сразу понимал, с чего начать.
com.company.crm.ai.view.conversation/promptSuggestion.10.title=Отчет по cashflow-риску
com.company.crm.ai.view.conversation/promptSuggestion.10.prompt=Проанализируй распределение cashflow и рисков по доступным категориям продуктов или услуг и объясни самые важные выводы. Выдели категории с высоким риском или необычным распределением и скажи, какие действия из этого следуют.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.target.singular=this client
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.target.plural=these clients
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.1.title=Client health check
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.1.prompt=Analyze %s using the CRM context. Summarize revenue, open invoices, payment behavior, recent orders, visible risks, and the next actions for account management.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.2.title=Payment risk
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.2.prompt=Review payment and invoice risk for %s. Highlight overdue amounts, unpaid balances, unusual payment behavior, and which finance follow-ups should happen first.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.3.title=Order readiness
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.3.prompt=Review the order situation for %s. Identify important orders, open delivery or fulfillment risks, related invoices, and recommended operational follow-ups.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.4.title=Meeting brief
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.4.prompt=Create a concise meeting brief for %s. Include the business relationship, recent activity, financial status, likely talking points, and concrete next steps.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.target.singular=this order
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.target.plural=these orders
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.1.title=Order status review
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.1.prompt=Review %s in context. Summarize status, total value, key line items, client impact, and any risks or blockers that need attention.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.2.title=Invoice impact
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.2.prompt=Check how %s connects to invoices and payments. Explain what has been billed, what remains open, and whether finance should follow up.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.3.title=Client follow-up
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.3.prompt=Prepare a client-facing follow-up summary for %s. Include current status, important items, open questions, and the next best action.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.4.title=Product mix
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.4.prompt=Analyze the product or category mix in %s. Point out the most important items, unusual quantities or values, and sales opportunities.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.target.singular=this invoice
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.target.plural=these invoices
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.1.title=Invoice review
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.1.prompt=Review %s and summarize status, due date, total amount, related order, payments received, and remaining balance.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.2.title=Collection risk
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.2.prompt=Assess collection risk for %s. Highlight overdue or unpaid amounts, likely causes, and which follow-up should happen first.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.3.title=Business chain
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.3.prompt=Explain the business chain around %s: client, order, invoice, payments, and any open operational or financial issues.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.4.title=Finance action plan
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.4.prompt=Create a prioritized finance action plan for %s. Include what to check, who to contact, and what outcome to aim for.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.target.singular=this payment
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.target.plural=these payments
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.1.title=Payment allocation
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.1.prompt=Review %s and explain which invoice, order, and client it belongs to. Summarize amount, date, and any remaining balance.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.2.title=Cashflow impact
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.2.prompt=Analyze the cashflow impact of %s. Explain what this payment changes for the client balance and whether any finance action remains.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.3.title=Payment behavior
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.3.prompt=Use %s to assess the related client's payment behavior. Highlight timeliness, open invoices, risk signals, and next actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.4.title=Reconciliation check
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.4.prompt=Check whether %s looks consistent with the related invoice and order. Point out mismatches, missing data, or follow-up needs.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.target.singular=this product
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.target.plural=these products
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.1.title=Product summary
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.1.prompt=Create a business summary for %s. Explain what it is, how it is used in orders, and what a salesperson should know.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.2.title=Sales opportunities
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.2.prompt=Analyze sales opportunities around %s. Identify relevant clients, recent orders, and useful next actions for sales.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.3.title=Order history
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.3.prompt=Review order history for %s. Highlight important orders, unusual demand patterns, and any risks or follow-ups.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.4.title=Category context
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.4.prompt=Explain how %s fits into its category and where it creates business value. Mention related products or client segments if visible.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.target.singular=this category
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.target.plural=these categories
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.1.title=Category overview
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.1.prompt=Analyze %s as a business category. Summarize related products, order activity, revenue relevance, and visible risks.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.2.title=Cashflow risk
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.2.prompt=Review cashflow and risk signals for %s. Highlight important products, clients, or invoices that deserve attention.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.3.title=Sales focus
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.3.prompt=Suggest where sales should focus within %s. Identify promising products, active clients, and next actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.4.title=Portfolio cleanup
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.4.prompt=Check %s for underused, unusual, or high-risk products. Recommend cleanup, follow-up, or reporting actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.target.singular=this task
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.target.plural=these tasks
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.1.title=Task brief
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.1.prompt=Create a concise brief for %s. Summarize purpose, urgency, related CRM records, owner context, and expected next action.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.2.title=Action plan
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.2.prompt=Turn %s into a practical action plan. List the next steps, dependencies, risks, and what should be done first.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.3.title=Blocked work
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.3.prompt=Check whether %s appears blocked or risky. Identify missing information, related clients or documents, and escalation needs.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.4.title=Customer impact
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.4.prompt=Explain the customer or business impact of %s. Highlight why it matters and how completing it changes the CRM situation.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.target.singular=this contact
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.target.plural=these contacts
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.1.title=Contact brief
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.1.prompt=Create a CRM brief for %s. Summarize role, related client, communication relevance, open topics, and useful next steps.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.2.title=Client relationship
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.2.prompt=Analyze how %s fits into the related client relationship. Highlight decision influence, recent context, risks, and account-management actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.3.title=Meeting preparation
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.3.prompt=Prepare for a conversation with %s. Include likely talking points, relevant client data, open invoices or orders, and follow-up questions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.4.title=Follow-up ideas
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.4.prompt=Suggest useful follow-up actions for %s based on the related CRM context. Prioritize actions for sales, finance, or support.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.target.singular=this order item
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.target.plural=these order items
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.1.title=Line item review
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.1.prompt=Review %s in its order context. Explain product, quantity, value, client relevance, and any fulfillment or pricing risks.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.2.title=Product demand
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.2.prompt=Use %s to assess product demand and sales relevance. Mention related category, order value, and possible upsell or follow-up opportunities.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.3.title=Order impact
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.3.prompt=Explain how %s affects the related order and client situation. Highlight dependencies, invoice impact, and operational next steps.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.4.title=Risk check
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.4.prompt=Check %s for unusual quantity, pricing, product, or fulfillment signals. Tell me what should be verified before follow-up.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.target.singular=this product comment
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.target.plural=these product comments
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.1.title=Comment summary
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.1.prompt=Summarize %s in business language. Explain the related product, the sender context, the issue or signal, and what should happen next.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.2.title=Product feedback
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.2.prompt=Use %s as product feedback. Identify whether it points to quality, demand, sales, or support topics and suggest follow-up actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.3.title=Sales signal
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.3.prompt=Check whether %s contains a useful sales or account-management signal. Relate it to product context and possible customer impact.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.4.title=Support follow-up
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.4.prompt=Create a support follow-up plan for %s. Include who should respond, what to clarify, and what CRM context matters.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.target.singular=this user
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.target.plural=these users
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.1.title=Workload overview
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.1.prompt=Analyze CRM context for %s. Summarize owned clients, tasks, recent activity, and areas that may need management attention.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.2.title=Account focus
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.2.prompt=Identify where %s should focus next. Prioritize clients, orders, invoices, or tasks that seem most important.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.3.title=Risk handover
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.3.prompt=Create a risk handover for %s. Highlight open work, risky clients, overdue finance topics, and follow-up responsibilities.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.4.title=Activity summary
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.4.prompt=Summarize recent CRM activity around %s and explain what it means for sales, finance, or operations.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.target.singular=this selected context
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.target.plural=these selected records
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.1.title=Context overview
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.1.prompt=Analyze %s together. Explain what each record represents, how they relate, and what business situation they describe.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.2.title=Risks and gaps
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.2.prompt=Review %s for risks, missing information, overdue work, or inconsistent data. Prioritize the issues that need attention.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.3.title=Next actions
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.3.prompt=Derive the most useful next actions from %s. Give me a prioritized list with short reasoning and clear owners where possible.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.4.title=Business summary
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.4.prompt=Create a compact management summary for %s. Focus on financial status, operational state, customer impact, and follow-up needs.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.target.singular=this record
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.target.plural=these records
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.1.title=Record summary
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.1.prompt=Summarize %s in business language. Include the most important fields, related records, and why this matters.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.2.title=Risk review
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.2.prompt=Review %s for visible risks, blockers, missing information, or follow-up needs. Prioritize the findings.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.3.title=Related context
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.3.prompt=Explain how %s relates to other CRM data such as clients, orders, invoices, payments, products, or tasks.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.4.title=Next actions
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.4.prompt=Suggest practical next actions for %s. Keep the list prioritized and explain the reason for each action.

