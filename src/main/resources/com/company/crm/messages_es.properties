com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.1.prompt=Review %s and summarize status, due date, total amount, related order, payments received, and remaining balance.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.2.title=Collection risk
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.2.prompt=Assess collection risk for %s. Highlight overdue or unpaid amounts, likely causes, and which follow-up should happen first.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.3.title=Business chain
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.3.prompt=Explain the business chain around %s: client, order, invoice, payments, and any open operational or financial issues.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.4.title=Finance action plan
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.4.prompt=Create a prioritized finance action plan for %s. Include what to check, who to contact, and what outcome to aim for.
