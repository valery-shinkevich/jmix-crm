com.company.crm.ai.view.conversation/promptSuggestion.entity.order.1.prompt=Review %s in context. Summarize status, total value, key line items, client impact, and any risks or blockers that need attention.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.2.title=Invoice impact
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.2.prompt=Check how %s connects to invoices and payments. Explain what has been billed, what remains open, and whether finance should follow up.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.3.title=Client follow-up
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.3.prompt=Prepare a client-facing follow-up summary for %s. Include current status, important items, open questions, and the next best action.
