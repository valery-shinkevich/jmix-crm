com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.4.title=Risk check
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.4.prompt=Check %s for unusual quantity, pricing, product, or fulfillment signals. Tell me what should be verified before follow-up.
