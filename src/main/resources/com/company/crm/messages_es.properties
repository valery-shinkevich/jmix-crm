com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.2.title=Client relationship
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.2.prompt=Analyze how %s fits into the related client relationship. Highlight decision influence, recent context, risks, and account-management actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.3.title=Meeting preparation
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.3.prompt=Prepare for a conversation with %s. Include likely talking points, relevant client data, open invoices or orders, and follow-up questions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.4.title=Follow-up ideas
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.4.prompt=Suggest useful follow-up actions for %s based on the related CRM context. Prioritize actions for sales, finance, or support.
