com.company.crm.ai.view.conversation/promptSuggestion.1.title=Clientes con más riesgo
com.company.crm.ai.view.conversation/promptSuggestion.1.prompt=Revisa Connelly LLC, Kulas-Luettgen, King-Adams, Zulauf, Kihn and Lakin y Strosin Inc para detectar señales de riesgo basadas en facturas abiertas, pagos vencidos o actividad reciente inusual. Usa los datos CRM disponibles, ejecuta consultas JPQL si es necesario y explica brevemente cuáles son ahora los cinco clientes más críticos y por qué.
com.company.crm.ai.view.conversation/promptSuggestion.2.title=Facturas vencidas principales
com.company.crm.ai.view.conversation/promptSuggestion.2.prompt=Muéstrame las cinco facturas vencidas más importantes con cliente, importe, fecha de vencimiento y estado. Priorízalas por riesgo de negocio y explica qué casos debería revisar primero.
com.company.crm.ai.view.conversation/promptSuggestion.3.title=Priorizar pipeline
com.company.crm.ai.view.conversation/promptSuggestion.3.prompt=Analiza el pipeline de ventas actual y dime qué oportunidades necesitan más atención ahora mismo. Considera volumen, estado y posibles señales de riesgo y convierte el resultado en un breve resumen ejecutivo.
com.company.crm.ai.view.conversation/promptSuggestion.4.title=Resumen de Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.4.prompt=Crea una vista de cliente de 360 grados compacta para Connelly LLC para preparar una reunión con el cliente. Resume ingresos, facturas abiertas, comportamiento de pago, actividades recientes y riesgos visibles en un briefing ejecutivo claro.
com.company.crm.ai.view.conversation/promptSuggestion.5.title=Revisar pedidos de Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.5.prompt=Muéstrame los pedidos más valiosos o inusuales relacionados con Connelly LLC y explica por qué importan desde una perspectiva de negocio. Usa los datos disponibles e indica asuntos abiertos, riesgos o acciones de seguimiento.
com.company.crm.ai.view.conversation/promptSuggestion.6.title=Cadena de factura Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.6.prompt=Explícame con un ejemplo concreto para Connelly LLC cómo se relacionan una factura, un pedido, un pago y un cliente en el flujo de negocio. Si hay varios registros relevantes, conviértelos en una historia de negocio clara con los IDs o nombres clave.
com.company.crm.ai.view.conversation/promptSuggestion.7.title=Analizar patrones de pago
com.company.crm.ai.view.conversation/promptSuggestion.7.prompt=Comprueba si ahora hay patrones inusuales de pago, reclamación o retraso. Muestra ejemplos concretos y deduce dónde finance o account management deberían actuar.
com.company.crm.ai.view.conversation/promptSuggestion.8.title=Presentar un producto
com.company.crm.ai.view.conversation/promptSuggestion.8.prompt=Crea un resumen comercial breve y convincente para un producto seleccionado en lenguaje de negocio. Describe el valor, los posibles casos de uso y lo que un vendedor debería destacar en una conversación.
com.company.crm.ai.view.conversation/promptSuggestion.9.title=Próximas acciones Connelly LLC
com.company.crm.ai.view.conversation/promptSuggestion.9.prompt=Deriva de los datos CRM actuales las próximas acciones más útiles para ventas y finance para Connelly LLC. Dame una lista priorizada con una breve justificación para poder actuar de inmediato.
com.company.crm.ai.view.conversation/promptSuggestion.10.title=Informe de riesgo de cashflow
com.company.crm.ai.view.conversation/promptSuggestion.10.prompt=Analiza la distribución de cashflow y riesgo entre las categorías de productos o servicios disponibles y explica los hallazgos más importantes. Destaca categorías con alto riesgo o asignación inusual y dime qué acciones deberían seguir.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.target.singular=this client
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.target.plural=these clients
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.1.title=Client health check
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.1.prompt=Analyze %s using the CRM context. Summarize revenue, open invoices, payment behavior, recent orders, visible risks, and the next actions for account management.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.2.title=Payment risk
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.2.prompt=Review payment and invoice risk for %s. Highlight overdue amounts, unpaid balances, unusual payment behavior, and which finance follow-ups should happen first.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.3.title=Order readiness
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.3.prompt=Review the order situation for %s. Identify important orders, open delivery or fulfillment risks, related invoices, and recommended operational follow-ups.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.4.title=Meeting brief
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.4.prompt=Create a concise meeting brief for %s. Include the business relationship, recent activity, financial status, likely talking points, and concrete next steps.
