com.company.crm.ai.view.conversation/promptSuggestion.entity.product.1.prompt=Create a business summary for %s. Explain what it is, how it is used in orders, and what a salesperson should know.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.2.title=Sales opportunities
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.2.prompt=Analyze sales opportunities around %s. Identify relevant clients, recent orders, and useful next actions for sales.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.3.title=Order history
