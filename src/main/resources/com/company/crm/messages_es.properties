com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.2.title=Cashflow impact
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.2.prompt=Analyze the cashflow impact of %s. Explain what this payment changes for the client balance and whether any finance action remains.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.3.title=Payment behavior
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.3.prompt=Use %s to assess the related client's payment behavior. Highlight timeliness, open invoices, risk signals, and next actions.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.4.title=Reconciliation check
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.4.prompt=Check whether %s looks consistent with the related invoice and order. Point out mismatches, missing data, or follow-up needs.
