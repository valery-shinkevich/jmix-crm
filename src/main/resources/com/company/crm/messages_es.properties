com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.1.prompt=Review %s in its order context. Explain product, quantity, value, client relevance, and any fulfillment or pricing risks.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.2.title=Product demand
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.2.prompt=Use %s to assess product demand and sales relevance. Mention related category, order value, and possible upsell or follow-up opportunities.
