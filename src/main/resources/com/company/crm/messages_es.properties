com.company.crm.ai.view.conversation/promptSuggestion.entity.task.1.prompt=Create a concise brief for %s. Summarize purpose, urgency, related CRM records, owner context, and expected next action.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.2.title=Action plan
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.2.prompt=Turn %s into a practical action plan. List the next steps, dependencies, risks, and what should be done first.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.3.title=Blocked work
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.3.prompt=Check whether %s appears blocked or risky. Identify missing information, related clients or documents, and escalation needs.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.4.title=Customer impact
