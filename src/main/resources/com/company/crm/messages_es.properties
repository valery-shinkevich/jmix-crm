com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.3.prompt=Check whether %s contains a useful sales or account-management signal. Relate it to product context and possible customer impact.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.4.title=Support follow-up
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.4.prompt=Create a support follow-up plan for %s. Include who should respond, what to clarify, and what CRM context matters.
