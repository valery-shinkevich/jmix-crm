com.company.crm.ai.view.conversation/promptSuggestionStartAction=Start with this prompt
com.company.crm.ai.view.conversation/promptSuggestion.1.title=Top risk clients
com.company.crm.ai.view.conversation/promptSuggestion.1.prompt=Review Connelly LLC, Kulas-Luettgen, King-Adams, Zulauf, Kihn and Lakin, and Strosin Inc for risk signals based on open invoices, overdue payments, or unusual recent activity. Use the available CRM data, execute JPQL queries if needed, and briefly explain which five clients are currently the most critical and why.
com.company.crm.ai.view.conversation/promptSuggestion.2.title=Top overdue invoices
com.company.crm.ai.view.conversation/promptSuggestion.2.prompt=Show me the five most important overdue invoices with client, amount, due date, and status. Prioritize them by business risk and explain which cases I should review first.
com.company.crm.ai.view.conversation/promptSuggestion.3.title=Prioritize pipeline
com.company.crm.ai.view.conversation/promptSuggestion.3.prompt=Analyze the current sales pipeline and tell me which deals need the most attention right now. Consider deal volume, status, and possible risk signals and turn the result into a short management summary.
com.company.crm.ai.view.conversation/promptSuggestion.4.title=Connelly LLC overview
com.company.crm.ai.view.conversation/promptSuggestion.4.prompt=Create a compact 360-degree client view for the client Connelly LLC to prepare for a customer meeting. Summarize revenue, open invoices, payment behavior, recent activities, and visible risks in a clear management-style briefing.
com.company.crm.ai.view.conversation/promptSuggestion.5.title=Review Connelly LLC orders
com.company.crm.ai.view.conversation/promptSuggestion.5.prompt=Show me the most valuable or most unusual orders around the client Connelly LLC and explain why they matter from a business perspective. Use the available data and point out open issues, risks, or follow-up actions.
com.company.crm.ai.view.conversation/promptSuggestion.6.title=Connelly LLC invoice chain
com.company.crm.ai.view.conversation/promptSuggestion.6.prompt=Explain with one concrete example for the client Connelly LLC how an invoice, order, payment, and client are related in the business flow. If several records are relevant, turn them into one clear business story with the key IDs or names.
com.company.crm.ai.view.conversation/promptSuggestion.7.title=Analyze payment patterns
com.company.crm.ai.view.conversation/promptSuggestion.7.prompt=Check whether there are unusual payment, dunning, or delay patterns at the moment. Show concrete examples and derive where finance or account management should take action.
com.company.crm.ai.view.conversation/promptSuggestion.8.title=Pitch a product
com.company.crm.ai.view.conversation/promptSuggestion.8.prompt=Create a short and convincing sales summary for one selected product in business language. Describe the value, likely use cases, and what a salesperson should emphasize in a conversation.
com.company.crm.ai.view.conversation/promptSuggestion.9.title=Connelly LLC next actions
com.company.crm.ai.view.conversation/promptSuggestion.9.prompt=Derive the most useful next actions for sales and finance for the client Connelly LLC from the current CRM data. Give me a prioritized list with short reasoning so I can act on it immediately.
com.company.crm.ai.view.conversation/promptSuggestion.10.title=Cashflow risk report
com.company.crm.ai.view.conversation/promptSuggestion.10.prompt=Analyze the cashflow and risk distribution across the available product or service categories and explain the most important findings. Highlight categories with high risk or unusual allocation and tell me which actions should follow.
