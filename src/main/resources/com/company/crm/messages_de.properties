com.company.crm.ai.view.conversation/promptSuggestionStartAction=Mit diesem Prompt starten
com.company.crm.ai.view.conversation/promptSuggestion.1.title=Top-Risikokunden
com.company.crm.ai.view.conversation/promptSuggestion.1.prompt=Prüfe besonders Connelly LLC, Kulas-Luettgen, King-Adams, Zulauf, Kihn and Lakin und Strosin Inc auf Risikoindikatoren aus offenen Rechnungen, überfälligen Zahlungen oder auffälligen Aktivitäten. Nutze die vorhandenen CRM-Daten, führe bei Bedarf JPQL-Abfragen aus und erkläre mir kurz, welche fünf Kunden aktuell am kritischsten sind und warum.
com.company.crm.ai.view.conversation/promptSuggestion.2.title=Top überfällige Rechnungen
com.company.crm.ai.view.conversation/promptSuggestion.2.prompt=Zeige mir die fünf wichtigsten überfälligen Rechnungen mit Kunde, Betrag, Fälligkeit und Status. Priorisiere nach geschäftlichem Risiko und erkläre, welche Fälle ich mir zuerst ansehen sollte.
com.company.crm.ai.view.conversation/promptSuggestion.3.title=Pipeline priorisieren
com.company.crm.ai.view.conversation/promptSuggestion.3.prompt=Analysiere die aktuelle Sales-Pipeline und nenne mir die Deals, die jetzt am meisten Aufmerksamkeit brauchen. Berücksichtige Volumen, Status und mögliche Risiken und formuliere daraus eine kurze Management-Zusammenfassung.
com.company.crm.ai.view.conversation/promptSuggestion.4.title=Connelly LLC im Überblick
com.company.crm.ai.view.conversation/promptSuggestion.4.prompt=Erstelle für den Kunden Connelly LLC eine kompakte 360-Grad-Kundensicht für ein Kundengespräch. Fasse Umsatz, offene Rechnungen, Zahlungsverhalten, letzte Aktivitäten und erkennbare Risiken in einer klaren Management-Zusammenfassung zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.5.title=Connelly LLC Aufträge prüfen
com.company.crm.ai.view.conversation/promptSuggestion.5.prompt=Zeige mir die auffälligsten oder wertvollsten Aufträge rund um den Kunden Connelly LLC und erkläre, was daran geschäftlich relevant ist. Nutze die vorhandenen Daten und weise auf offene Punkte, Risiken oder Nachfassbedarf hin.
com.company.crm.ai.view.conversation/promptSuggestion.6.title=Connelly LLC Rechnungskette
com.company.crm.ai.view.conversation/promptSuggestion.6.prompt=Erkläre mir an einem konkreten Beispiel für den Kunden Connelly LLC, wie Rechnung, Auftrag, Zahlung und Kunde fachlich zusammenhängen. Wenn mehrere Datensätze relevant sind, fasse sie in einer klaren Business-Erzählung mit den wichtigsten IDs oder Namen zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.7.title=Zahlungsmuster analysieren
com.company.crm.ai.view.conversation/promptSuggestion.7.prompt=Prüfe, ob es derzeit auffällige Zahlungs-, Mahn- oder Verzögerungsmuster gibt. Zeige mir konkrete Beispiele und leite daraus ab, wo Finance oder Account Management aktiv werden sollten.
com.company.crm.ai.view.conversation/promptSuggestion.8.title=Produkt pitchen
com.company.crm.ai.view.conversation/promptSuggestion.8.prompt=Erstelle für ein ausgewähltes Produkt eine kurze, überzeugende Sales-Zusammenfassung in Business-Sprache. Beschreibe den Nutzen, mögliche Einsatzszenarien und worauf ein Verkäufer im Gespräch besonders achten sollte.
com.company.crm.ai.view.conversation/promptSuggestion.9.title=Connelly LLC nächste Aktionen
com.company.crm.ai.view.conversation/promptSuggestion.9.prompt=Leite aus den aktuellen CRM-Daten die sinnvollsten nächsten Aktionen für Vertrieb und Finance für den Kunden Connelly LLC ab. Gib mir eine priorisierte Liste mit kurzer Begründung, damit ich sofort weiß, womit ich anfangen sollte.
com.company.crm.ai.view.conversation/promptSuggestion.10.title=Cashflow-Risiko Report
com.company.crm.ai.view.conversation/promptSuggestion.10.prompt=Analysiere die Cashflow- und Risikoverteilung über die vorhandenen Produkt- oder Leistungskategorien und erkläre mir die wichtigsten Auffälligkeiten. Hebe Kategorien mit hohem Risiko oder ungewöhnlicher Verteilung hervor und sage mir, welche Maßnahmen daraus folgen sollten.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.target.singular=diesen Kunden
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.target.plural=diese Kunden
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.1.title=Kundenstatus prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.1.prompt=Analysiere %s anhand des CRM-Kontexts. Fasse Umsatz, offene Rechnungen, Zahlungsverhalten, aktuelle Aufträge, erkennbare Risiken und nächste Schritte für das Account Management zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.2.title=Zahlungsrisiko
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.2.prompt=Prüfe Zahlungs- und Rechnungsrisiken für %s. Hebe überfällige Beträge, offene Salden, auffälliges Zahlungsverhalten und die wichtigsten Finance-Follow-ups hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.3.title=Auftragslage
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.3.prompt=Bewerte die Auftragslage für %s. Identifiziere wichtige Aufträge, Liefer- oder Erfüllungsrisiken, verbundene Rechnungen und sinnvolle operative Nachfassaktionen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.4.title=Meeting-Briefing
com.company.crm.ai.view.conversation/promptSuggestion.entity.client.4.prompt=Erstelle ein kompaktes Meeting-Briefing für %s. Berücksichtige Geschäftsbeziehung, letzte Aktivitäten, Finanzstatus, wahrscheinliche Gesprächsthemen und konkrete nächste Schritte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.target.singular=diesen Auftrag
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.target.plural=diese Aufträge
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.1.title=Auftragsstatus prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.1.prompt=Prüfe %s im Kontext. Fasse Status, Gesamtwert, wichtige Positionen, Kundenauswirkung und Risiken oder Blocker zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.2.title=Rechnungsauswirkung
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.2.prompt=Prüfe, wie %s mit Rechnungen und Zahlungen zusammenhängt. Erkläre, was bereits berechnet wurde, was offen ist und ob Finance nachfassen sollte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.3.title=Kunden-Follow-up
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.3.prompt=Erstelle eine kundenorientierte Follow-up-Zusammenfassung für %s. Nenne aktuellen Status, wichtige Positionen, offene Fragen und die beste nächste Aktion.
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.4.title=Produktmix
com.company.crm.ai.view.conversation/promptSuggestion.entity.order.4.prompt=Analysiere den Produkt- oder Kategoriemix in %s. Zeige die wichtigsten Positionen, ungewöhnliche Mengen oder Werte und mögliche Sales-Chancen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.target.singular=diese Rechnung
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.target.plural=diese Rechnungen
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.1.title=Rechnung prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.1.prompt=Prüfe %s und fasse Status, Fälligkeit, Gesamtbetrag, zugehörigen Auftrag, erhaltene Zahlungen und offenen Saldo zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.2.title=Inkassorisiko
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.2.prompt=Bewerte das Inkasso- und Zahlungsausfallrisiko für %s. Hebe überfällige oder unbezahlte Beträge, mögliche Ursachen und das wichtigste Follow-up hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.3.title=Business-Kette
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.3.prompt=Erkläre die Business-Kette rund um %s: Kunde, Auftrag, Rechnung, Zahlungen sowie offene operative oder finanzielle Punkte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.4.title=Finance-Aktionsplan
com.company.crm.ai.view.conversation/promptSuggestion.entity.invoice.4.prompt=Erstelle einen priorisierten Finance-Aktionsplan für %s. Nenne, was geprüft werden muss, wer kontaktiert werden sollte und welches Ergebnis anzustreben ist.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.target.singular=diese Zahlung
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.target.plural=diese Zahlungen
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.1.title=Zahlung zuordnen
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.1.prompt=Prüfe %s und erkläre, zu welcher Rechnung, welchem Auftrag und welchem Kunden sie gehört. Fasse Betrag, Datum und möglichen Restbetrag zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.2.title=Cashflow-Effekt
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.2.prompt=Analysiere den Cashflow-Effekt von %s. Erkläre, was diese Zahlung am Kundensaldo ändert und ob noch Finance-Aktionen offen sind.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.3.title=Zahlungsverhalten
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.3.prompt=Nutze %s, um das Zahlungsverhalten des zugehörigen Kunden einzuschätzen. Hebe Pünktlichkeit, offene Rechnungen, Risikosignale und nächste Schritte hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.4.title=Abstimmung prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.payment.4.prompt=Prüfe, ob %s zur zugehörigen Rechnung und zum Auftrag passt. Zeige Abweichungen, fehlende Daten oder Nachfassbedarf.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.target.singular=dieses Produkt
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.target.plural=diese Produkte
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.1.title=Produktzusammenfassung
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.1.prompt=Erstelle eine fachliche Zusammenfassung für %s. Erkläre, was es ist, wie es in Aufträgen verwendet wird und was ein Verkäufer wissen sollte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.2.title=Sales-Chancen
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.2.prompt=Analysiere Sales-Chancen rund um %s. Identifiziere relevante Kunden, aktuelle Aufträge und nützliche nächste Schritte für den Vertrieb.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.3.title=Auftragshistorie
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.3.prompt=Prüfe die Auftragshistorie für %s. Hebe wichtige Aufträge, auffällige Nachfragemuster sowie Risiken oder Follow-ups hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.4.title=Kategoriekontext
com.company.crm.ai.view.conversation/promptSuggestion.entity.product.4.prompt=Erkläre, wie %s in die Kategorie passt und wo geschäftlicher Nutzen entsteht. Erwähne verwandte Produkte oder Kundensegmente, falls sichtbar.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.target.singular=diese Kategorie
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.target.plural=diese Kategorien
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.1.title=Kategorieüberblick
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.1.prompt=Analysiere %s als Business-Kategorie. Fasse zugehörige Produkte, Auftragsaktivität, Umsatzrelevanz und sichtbare Risiken zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.2.title=Cashflow-Risiko
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.2.prompt=Prüfe Cashflow- und Risikosignale für %s. Hebe wichtige Produkte, Kunden oder Rechnungen hervor, die Aufmerksamkeit verdienen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.3.title=Sales-Fokus
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.3.prompt=Schlage vor, worauf Sales innerhalb von %s achten sollte. Identifiziere vielversprechende Produkte, aktive Kunden und nächste Aktionen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.4.title=Portfolio prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.category.4.prompt=Prüfe %s auf wenig genutzte, auffällige oder risikobehaftete Produkte. Empfiehl Bereinigung, Follow-up oder Reporting-Schritte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.target.singular=diese Aufgabe
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.target.plural=diese Aufgaben
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.1.title=Aufgaben-Briefing
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.1.prompt=Erstelle ein kompaktes Briefing für %s. Fasse Zweck, Dringlichkeit, zugehörige CRM-Datensätze, Owner-Kontext und erwartete nächste Aktion zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.2.title=Aktionsplan
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.2.prompt=Übersetze %s in einen praktischen Aktionsplan. Liste nächste Schritte, Abhängigkeiten, Risiken und die wichtigste erste Aktion auf.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.3.title=Blocker prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.3.prompt=Prüfe, ob %s blockiert oder riskant wirkt. Identifiziere fehlende Informationen, zugehörige Kunden oder Dokumente und Eskalationsbedarf.
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.4.title=Kundenauswirkung
com.company.crm.ai.view.conversation/promptSuggestion.entity.task.4.prompt=Erkläre die Kunden- oder Geschäftsauswirkung von %s. Zeige, warum es wichtig ist und wie die Erledigung die CRM-Situation verändert.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.target.singular=diesen Kontakt
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.target.plural=diese Kontakte
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.1.title=Kontakt-Briefing
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.1.prompt=Erstelle ein CRM-Briefing für %s. Fasse Rolle, zugehörigen Kunden, Kommunikationsrelevanz, offene Themen und sinnvolle nächste Schritte zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.2.title=Kundenbeziehung
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.2.prompt=Analysiere, wie %s in die zugehörige Kundenbeziehung passt. Hebe Einfluss, aktuellen Kontext, Risiken und Account-Management-Aktionen hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.3.title=Gespräch vorbereiten
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.3.prompt=Bereite ein Gespräch mit %s vor. Nenne mögliche Gesprächsthemen, relevante Kundendaten, offene Rechnungen oder Aufträge und Follow-up-Fragen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.4.title=Follow-up-Ideen
com.company.crm.ai.view.conversation/promptSuggestion.entity.contact.4.prompt=Schlage sinnvolle Follow-up-Aktionen für %s auf Basis des CRM-Kontexts vor. Priorisiere Maßnahmen für Sales, Finance oder Support.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.target.singular=diese Auftragsposition
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.target.plural=diese Auftragspositionen
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.1.title=Position prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.1.prompt=Prüfe %s im Auftragskontext. Erkläre Produkt, Menge, Wert, Kundenrelevanz und mögliche Erfüllungs- oder Preisrisiken.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.2.title=Produktnachfrage
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.2.prompt=Nutze %s zur Einschätzung von Produktnachfrage und Sales-Relevanz. Erwähne Kategorie, Auftragswert und mögliche Upsell- oder Follow-up-Chancen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.3.title=Auftragsauswirkung
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.3.prompt=Erkläre, wie %s den zugehörigen Auftrag und die Kundensituation beeinflusst. Hebe Abhängigkeiten, Rechnungsauswirkung und operative nächste Schritte hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.4.title=Risiko-Check
com.company.crm.ai.view.conversation/promptSuggestion.entity.orderItem.4.prompt=Prüfe %s auf auffällige Menge, Preis, Produkt oder Erfüllungssignale. Sage mir, was vor dem Follow-up verifiziert werden sollte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.target.singular=diesen Produktkommentar
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.target.plural=diese Produktkommentare
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.1.title=Kommentar zusammenfassen
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.1.prompt=Fasse %s in Business-Sprache zusammen. Erkläre das zugehörige Produkt, Sender-Kontext, Thema oder Signal und was als Nächstes passieren sollte.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.2.title=Produktfeedback
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.2.prompt=Nutze %s als Produktfeedback. Erkenne, ob es auf Qualität, Nachfrage, Sales oder Support hinweist, und schlage Follow-up-Aktionen vor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.3.title=Sales-Signal
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.3.prompt=Prüfe, ob %s ein nützliches Sales- oder Account-Management-Signal enthält. Verknüpfe es mit Produktkontext und möglicher Kundenauswirkung.
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.4.title=Support-Follow-up
com.company.crm.ai.view.conversation/promptSuggestion.entity.productComment.4.prompt=Erstelle einen Support-Follow-up-Plan für %s. Nenne, wer antworten sollte, was zu klären ist und welcher CRM-Kontext wichtig ist.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.target.singular=diesen Benutzer
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.target.plural=diese Benutzer
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.1.title=Arbeitslast
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.1.prompt=Analysiere den CRM-Kontext für %s. Fasse betreute Kunden, Aufgaben, letzte Aktivitäten und Bereiche mit Management-Aufmerksamkeit zusammen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.2.title=Account-Fokus
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.2.prompt=Identifiziere, worauf %s sich als Nächstes konzentrieren sollte. Priorisiere Kunden, Aufträge, Rechnungen oder Aufgaben mit hoher Relevanz.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.3.title=Risiko-Handover
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.3.prompt=Erstelle ein Risiko-Handover für %s. Hebe offene Arbeit, riskante Kunden, überfällige Finance-Themen und Follow-up-Verantwortungen hervor.
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.4.title=Aktivitätsübersicht
com.company.crm.ai.view.conversation/promptSuggestion.entity.user.4.prompt=Fasse die jüngsten CRM-Aktivitäten rund um %s zusammen und erkläre, was das für Sales, Finance oder Operations bedeutet.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.target.singular=diesen ausgewählten Kontext
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.target.plural=diese ausgewählten Datensätze
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.1.title=Kontextüberblick
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.1.prompt=Analysiere %s zusammen. Erkläre, wofür jeder Datensatz steht, wie sie zusammenhängen und welche geschäftliche Situation sie beschreiben.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.2.title=Risiken und Lücken
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.2.prompt=Prüfe %s auf Risiken, fehlende Informationen, überfällige Arbeit oder inkonsistente Daten. Priorisiere die Punkte, die Aufmerksamkeit brauchen.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.3.title=Nächste Aktionen
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.3.prompt=Leite aus %s die sinnvollsten nächsten Aktionen ab. Gib mir eine priorisierte Liste mit kurzer Begründung und klaren Verantwortlichkeiten, soweit möglich.
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.4.title=Business-Zusammenfassung
com.company.crm.ai.view.conversation/promptSuggestion.entity.mixed.4.prompt=Erstelle eine kompakte Management-Zusammenfassung für %s. Fokussiere Finanzstatus, operative Lage, Kundenauswirkung und Follow-up-Bedarf.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.target.singular=diesen Datensatz
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.target.plural=diese Datensätze
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.1.title=Datensatz zusammenfassen
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.1.prompt=Fasse %s in Business-Sprache zusammen. Nenne die wichtigsten Felder, zugehörige Datensätze und warum das relevant ist.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.2.title=Risiko prüfen
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.2.prompt=Prüfe %s auf sichtbare Risiken, Blocker, fehlende Informationen oder Follow-up-Bedarf. Priorisiere die Erkenntnisse.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.3.title=Zusammenhänge
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.3.prompt=Erkläre, wie %s mit anderen CRM-Daten wie Kunden, Aufträgen, Rechnungen, Zahlungen, Produkten oder Aufgaben zusammenhängt.
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.4.title=Nächste Schritte
com.company.crm.ai.view.conversation/promptSuggestion.entity.generic.4.prompt=Schlage praktische nächste Schritte für %s vor. Halte die Liste priorisiert und erkläre den Grund für jede Aktion.

